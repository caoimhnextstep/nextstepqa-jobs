name: Detect New Irish QA Roles

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@3
        working-directory: worker

      - name: Run detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node worker/detect.js

      - name: Commit changes
        run: |
          git config --global user.email "bot@nextstepqa.com"
          git config --global user.name "NextStepQA Bot"
          git add data/
          git diff --staged --quiet || git commit -m "🔍 Role detection $(date -u +%Y-%m-%d)"
          git push
